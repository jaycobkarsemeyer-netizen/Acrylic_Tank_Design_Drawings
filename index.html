<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aquarium Lid Designer V4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar"><h2>Aquarium Lid Designer V4</h2></div>

<div class="layout">
  <div class="left">
    <button id="rectTool">Rectangle</button>
    <button id="circleTool">Circle</button>
    <button id="deleteTool">Delete</button>
  </div>

  <div class="center">
    <svg id="canvas" width="1000" height="700"></svg>
  </div>

  <div class="right">
    <h3>Properties</h3>
    <label>X</label><input id="xInput" type="number"><br>
    <label>Y</label><input id="yInput" type="number"><br>
    <label>Width</label><input id="wInput" type="number"><br>
    <label>Height</label><input id="hInput" type="number"><br>
    <button id="updateBtn">Update Shape</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
